name: Automated Massive UA Factory

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run UA Factory Generator
        run: python scripts/ua_generator.py

      - name: Commit and Push to Automation Branch
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git switch -C automation/monthly-ua
          git add data/user_agents.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(data): refresh monthly user-agent pool" && git push --force-with-lease origin automation/monthly-ua)
