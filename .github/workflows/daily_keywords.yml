name: Daily Trends Factory

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-trends:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Execute Trends Engine
        run: python scripts/fetch_trends.py

      - name: Commit and Push to Automation Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git switch -C automation/daily-keywords
          git add data/keywords/
          if git diff --staged --quiet; then
            echo "No changes, skipping."
            exit 0
          fi
          git commit -m "chore(data): refresh daily keyword set [$(date +'%Y-%m-%d')]"
          git push --force-with-lease origin automation/daily-keywords
